<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Eliana-Gatti" />
    <meta name="description" content="plantilla de componentes de bootstrap " />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Plantilla Bootstrap</title>
  </head>
  <body>
    <header>
      <nav class="navbar bg-primary navbar-expand-lg">
        <div class="container">
          <a href="./index.html" class="navbar-brand">Plantilla de Bootstrap</a>
          <button
            class="navbar-toggler"
            data-bs-toggle="collapse"
            data-bs-target="#opciones-menu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="opciones-menu">
            <ul class="navbar-nav ms-lg-auto">
              <li class="nav-item">
                <a class="nav-link" href="./index.html">inicio</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./pages/grilla.html">grilla</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="./contactos.html">contactos</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main class="container py-5 text-dark">
      <h1 class="display-3 fw-bold mb-5">Formularios con Stacks</h1>
      <div class="border border-secondary rounded-4 p-4 bg-dark bg-opacity-25">
        <form>
          <!-- FILA -->
          <div class="row g-4 mb-4">
            <!-- NOMBRE -->
            <div class="col-md-6">
              <label class="form-label fs-4 fw-semibold"> Nombre </label>
              <input
                type="text"
                class="form-control form-control-lg bg-dark text-light border-secondary"
                placeholder="Ej: Juan"
              />
            </div>
            <!-- EMAIL -->
            <div class="col-md-6">
              <label class="form-label fs-4 fw-semibold"> Email </label>
              <input
                type="email"
                class="form-control form-control-lg bg-dark text-light border-secondary"
                placeholder="test@ejemplo.com"
              />
            </div>
          </div>
          

    <footer class="text-center bg-dark-subtle py-2">
      <p>&copy; Todos los derechos reservados 2026</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
